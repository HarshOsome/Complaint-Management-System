<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard - CMS</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 30px; }
        .container { max-width: 800px; margin: auto; }
        h2 { color: #1F3864; }
        .welcome { color: #555; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        th { background: #2E5C8A; color: white; }
        .status { padding: 4px 10px; border-radius: 12px; font-size: 12px; color: white; }
        .PENDING { background: #d9534f; }
        .ASSIGNED { background: #f0ad4e; }
        .COMPLETED { background: #5cb85c; }
        .btn { padding: 6px 12px; background: #2E5C8A; color: white; text-decoration: none; border-radius: 4px; font-size: 13px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div>
                <h2>Employee Dashboard</h2>
                <p class="welcome">Welcome back, <span th:text="${user.name}"></span></p>
            </div>
            <a class="btn" th:href="@{/logout}">Logout</a>
        </div>
 
        <h3>Your Assigned Complaints</h3>
 
        <table th:if="${not #lists.isEmpty(assignedComplaints)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="complaint : ${assignedComplaints}">
                    <td th:text="${complaint.id}"></td>
                    <td th:text="${complaint.title}"></td>
                    <td>
                        <span class="status"
                              th:classappend="${complaint.status}"
                              th:text="${complaint.status}">
                        </span>
                    </td>
                    <td>
                        <a class="btn"
                           th:href="@{/complaints/{id}(id=${complaint.id})}">
                            View / Update
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
 
        <p th:if="${#lists.isEmpty(assignedComplaints)}">
			
            No Complaints Assigned.
        </p>
    </div>
</body>
</html>
